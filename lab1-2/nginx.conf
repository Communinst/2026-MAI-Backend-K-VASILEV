upstream api1_2 {
    server localhost:8000;
}
server {
    listen       8081;
    server_name  localhost;
    location / {
        root   html;
        index  index.html index.htm;
    }
    location /public/ {
        alias   X:/nginx_media/;
    }
    location /gunicorn/ {
        proxy_pass http://api1_2;
    }
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}
